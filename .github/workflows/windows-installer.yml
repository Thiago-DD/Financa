name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: pwsh
        run: |
          npm run build:github 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log
          if-no-files-found: ignore

      - name: Upload artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FinanceiroPessoal-Installer
          path: |
            dist/FinanceiroPessoal-Setup.exe
            dist/FinanceiroPessoal-Setup-*.exe
          if-no-files-found: error

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FinanceiroPessoal-Setup.exe
            dist/FinanceiroPessoal-Setup.exe.blockmap
            dist/FinanceiroPessoal-Setup-*.exe
            dist/FinanceiroPessoal-Setup-*.exe.blockmap
          generate_release_notes: true

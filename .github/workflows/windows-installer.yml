name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        id: build_installer
        continue-on-error: true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        shell: cmd
        run: |
          npm run build:github > build.log 2>&1
          set EXIT_CODE=%ERRORLEVEL%
          type build.log
          exit /b %EXIT_CODE%

      - name: Validate installer output
        shell: pwsh
        run: |
          if (!(Test-Path "dist/FinanceiroPessoal-Setup.exe")) {
            throw "Instalador nao gerado em dist/FinanceiroPessoal-Setup.exe"
          }

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log
          if-no-files-found: ignore

      - name: Upload artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FinanceiroPessoal-Installer
          path: |
            dist/FinanceiroPessoal-Setup.exe
            dist/FinanceiroPessoal-Setup-*.exe
          if-no-files-found: error

      - name: Publish GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "dist/FinanceiroPessoal-Setup.exe,dist/FinanceiroPessoal-Setup.exe.blockmap"
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
